name: Build

on:
  pull_request:
    branches: [ main ]
    paths-ignore: [ "**.md" ]
  schedule:
    - cron: "0 0 * * *"

permissions: {}

jobs:
  build_arch_linux:
    name: Build (Arch Linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel # zizmor: ignore[unpinned-images]
      options: --user root

    steps:
      - name: Refresh Packages
        run: pacman -Syu --noconfirm

      - name: Install Dependencies
        run: pacman -S --needed --noconfirm base-devel git extra-cmake-modules qt6-tools yaml-cpp libevdev

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Configure CMake
        run: cmake -B "${GITHUB_WORKSPACE}/build"

      - name: Build
        run: cmake --build "${GITHUB_WORKSPACE}/build" -j$(nproc)

  build_debian_experimental:
    name: Build (Debian experimental)
    runs-on: ubuntu-latest
    container:
      image: debian:experimental # zizmor: ignore[unpinned-images]
      options: --user root

    steps:
      - name: Refresh Packages
        run: apt-get update

      - name: Upgrade Packages
        run: apt-get upgrade -y

      - name: Install Dependencies
        run: apt-get install -y -f git cmake g++ extra-cmake-modules qt6-tools-dev gettext libyaml-cpp-dev libxkbcommon-dev pkg-config libevdev-dev libudev-dev libinput-dev libwayland-dev systemd-dev

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Configure CMake
        run: cmake -B "${GITHUB_WORKSPACE}/build"

      - name: Build
        run: cmake --build "${GITHUB_WORKSPACE}/build" -j$(nproc)

  build_debian_stable:
    name: Build (Debian stable)
    runs-on: ubuntu-latest
    container:
      image: debian:stable # zizmor: ignore[unpinned-images]
      options: --user root

    steps:
      - name: Refresh Packages
        run: apt-get update

      - name: Upgrade Packages
        run: apt-get upgrade -y

      - name: Install Dependencies
        run: apt-get install -y -f git cmake g++ extra-cmake-modules qt6-tools-dev gettext libyaml-cpp-dev libxkbcommon-dev pkg-config libevdev-dev libudev-dev libinput-dev libwayland-dev systemd-dev

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Configure CMake
        run: cmake -B "${GITHUB_WORKSPACE}/build"

      - name: Build
        run: cmake --build "${GITHUB_WORKSPACE}/build" -j$(nproc)

  build_fedora_44:
    name: Build (Fedora 44)
    runs-on: ubuntu-latest
    container:
      image: fedora:44 # zizmor: ignore[unpinned-images]
      options: --user root

    steps:
      - name: Install Dependencies
        run: dnf -y install git cmake extra-cmake-modules gcc-g++ qt6-qtbase-devel qt6-qtbase yaml-cpp yaml-cpp-devel libevdev libevdev-devel libinput-devel libudev-devel wayland-devel

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Configure CMake
        run: cmake -B "${GITHUB_WORKSPACE}/build"

      - name: Build
        run: cmake --build "${GITHUB_WORKSPACE}/build" -j$(nproc)

  build_nixos_unstable:
    name: Build (NixOS unstable)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update flake.lock
        run: nix flake update

      - name: Build
        run: nix build -L .?submodules=1#inputactions-standalone

  build_opensuse_tumbleweed:
    name: Build (opensuse Tumbleweed)
    runs-on: ubuntu-latest
    container:
      image: opensuse/tumbleweed # zizmor: ignore[unpinned-images]
      options: --user root

    steps:
      - name: Refresh Packages
        run: zypper ref

      - name: Install Dependencies
        run: zypper in -y git cmake-full gcc-c++ kf6-extra-cmake-modules "cmake(Qt6Core)" "cmake(Qt6DBus)" "cmake(Qt6Network)" yaml-cpp-devel libevdev-devel libudev-devel libinput-devel wayland-devel libxkbcommon-devel "pkgconfig(systemd)"

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Configure CMake
        run: cmake -B "${GITHUB_WORKSPACE}/build"

      - name: Build
        run: cmake --build "${GITHUB_WORKSPACE}/build" -j$(nproc)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
