name: Cachix

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"

permissions: {}

jobs:
  build_stable:
    name: Build and push to Cachix (nixpkgs 25.11)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: inputactions
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Patch flake.nix
        run: sed -i -e 's/nixos-unstable/nixos-25.11/g' flake.nix

      - name: Update flake.lock
        run: nix flake update

      - name: Build
        run: nix build -L .?submodules=1#inputactions-standalone

  build_unstable:
    name: Build and push to Cachix (nixpkgs unstable)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: inputactions
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Update flake.lock
        run: nix flake update

      - name: Build
        run: nix build -L .?submodules=1#inputactions-standalone

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
